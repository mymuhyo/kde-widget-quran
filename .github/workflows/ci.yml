name: CI

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y zip shellcheck

      - name: Shellcheck scripts
        run: shellcheck scripts/*.sh

      - name: Smoke check
        run: ./scripts/smoke-check.sh
